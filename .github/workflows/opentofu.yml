name: OpenTofu

on:
  push:
    # TODO: remove ci-iam-grants after verifying the workflow works end-to-end
    branches: [main, ci-iam-grants]
  pull_request:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: opentofu-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install OpenTofu
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone --opentofu-version 1.11.2
      - name: Validate
        working-directory: gcp
        run: |
          tofu init -backend=false
          tofu validate

  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: ambient-code-platform
          workload_identity_provider: projects/888214980327/locations/global/workloadIdentityPools/github/providers/ambient-code-github-actions
      - name: Install OpenTofu
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone --opentofu-version 1.11.2
      - name: Plan
        id: plan
        working-directory: gcp
        run: |
          tofu init
          tofu plan -var="project_id=ambient-code-platform" -no-color -out=tfplan 2>&1 | tee plan.txt
      - name: Post plan to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('gcp/plan.txt', 'utf8');
            const body = `#### OpenTofu Plan
            <details>
            <summary>Show plan</summary>

            \`\`\`
            ${plan}
            \`\`\`
            </details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  apply:
    # TODO: restore to main-only after verifying the workflow works end-to-end
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-iam-grants'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: ambient-code-platform
          workload_identity_provider: projects/888214980327/locations/global/workloadIdentityPools/github/providers/ambient-code-github-actions
      - name: Install OpenTofu
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone --opentofu-version 1.11.2
      - name: Apply
        working-directory: gcp
        run: |
          tofu init
          tofu apply -var="project_id=ambient-code-platform" -auto-approve
